project:
  name: langgraph-local-tool-service
  environment_name: lg_local_tool_service
  python_version: "3.11"

llm:
  provider: openai_compatible
  model_name: Qwen/Qwen3-1.7B
  base_url: http://127.0.0.1:8001/v1
  api_key: local-qwen
  temperature: 0.1
  max_tokens: 512
  timeout_seconds: 60
  planner_temperature: 0.0
  planner_max_tokens: 128
  summarize_enabled: false
  summarize_temperature: 0.1
  summarize_max_tokens: 256
  service:
    host: 127.0.0.1
    port: 8001
    server_backend: transformers
    model_source: Qwen/Qwen3-1.7B
    model_source_cn: Qwen/Qwen3-1.7B
    tensor_parallel_size: 1
    dtype: auto
    model_cache_dir: models
    download_timeout: 60
    device: auto
    trust_remote_code: false

mcp:
  service:
    host: 127.0.0.1
    port: 8002
  manifest_path: config/tools.yaml
  request_timeout_seconds: 30

gateway:
  service:
    host: 127.0.0.1
    port: 8000
  debug: true
  trace_store_limit: 200

retrieval:
  enabled: true
  model_name: BAAI/bge-small-zh-v1.5
  device: auto
  top_k: 5
  similarity_threshold: 0.2
  max_length: 256
  preload_on_startup: true

logging:
  level: INFO
  json: false
